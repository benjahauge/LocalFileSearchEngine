name: Build and Push Docker Image to Github Packages Repository

on:
    workflow_dispatch:

permissions:
    contents: read
    packages: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            
            - name: Login to Github Container Registry
              uses: docker/login-action@v2
              with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push
              run: | 
                docker build -t ghcr.io/${{ github.actor }}/filesearch:latest .
                docker push ghcr.io/${{ github.actor }}/filesearch:latest
