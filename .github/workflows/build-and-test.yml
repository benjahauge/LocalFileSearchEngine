name: build and test

on:
    push:

env:
    DOTNET_VERSION: '10.0'

jobs:
    build-and-test:

        name: build-and-test
        runs-on: ubuntu-latest

        steps:
        - name: Checkout
          uses: actions/checkout@v6

        - name: Setup .NET
          uses: actions/setup-dotnet@v4
          with:
            dotnet-version: ${{ env.DOTNET_VERSION }}

        - name: Install dependencies
          run: dotnet restore

        - name: Build
          run: dotnet restore

        - name: Test
          run: dotnet test --no-restore --verbosity normal
